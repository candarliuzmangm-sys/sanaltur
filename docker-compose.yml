version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: sanaltur-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: sanaltur
      POSTGRES_PASSWORD: sanaltur_dev
      POSTGRES_DB: sanaltur
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sanaltur"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sanaltur-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: sanaltur-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://sanaltur:sanaltur_dev@postgres:5432/sanaltur
      REDIS_URL: redis://redis:6379
      AI_SERVICE_URL: http://ai-service:8000
      JWT_SECRET: dev-jwt-secret-change-in-production
      PUBLIC_WEB_URL: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api:/app
      - /app/node_modules

  ai-service:
    build:
      context: ./apps/ai-service
      dockerfile: Dockerfile
    container_name: sanaltur-ai
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      ENVIRONMENT: development
      MODEL_CACHE_DIR: /app/models
    volumes:
      - ./apps/ai-service:/app
      - ai_models:/app/models

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: sanaltur-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
  ai_models:
