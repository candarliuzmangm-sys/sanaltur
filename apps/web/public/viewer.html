<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Sanaltur</title>
  <script src="https://cdn.jsdelivr.net/npm/marzipano@0.10.2/build/marzipano.js"></script>
  <link rel="stylesheet" href="/tour.css" />
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden; background: #0a0a0a; color: #fff; font-family: -apple-system, system-ui, sans-serif; }
    #root { height: 100%; display: flex; flex-direction: column; }
    .tour-flat { position: relative; flex: 1; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; touch-action: pan-y; }
    .tour-flat__img { max-width: 100%; max-height: 100%; object-fit: contain; user-select: none; -webkit-user-drag: none; }
    .tour-flat__nav { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0,0,0,0.55); border: none; color: #fff; width: 44px; height: 44px; border-radius: 22px; font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
    .tour-flat__nav:hover { background: rgba(0,0,0,0.75); }
    .tour-flat__nav--prev { left: 12px; }
    .tour-flat__nav--next { right: 12px; }
    .tour-flat__counter { position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.55); padding: 4px 12px; border-radius: 16px; font-size: 12px; backdrop-filter: blur(8px); }
    .tour-flat__transitions { position: absolute; bottom: 56px; left: 12px; right: 12px; display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; }
    .tour-flat__chip { background: rgba(34, 197, 94, 0.85); color: #fff; border: none; padding: 6px 14px; border-radius: 14px; font-size: 12px; cursor: pointer; font-weight: 600; }
    .tour-flat__chip:hover { background: rgba(34, 197, 94, 1); }
    .tour-empty { padding: 32px; text-align: center; color: #888; }
    .tour-error { padding: 24px; color: #fca5a5; text-align: center; }
  </style>
</head>
<body>
  <div id="root">
    <div class="tour-empty" id="loading">Tur yükleniyor…</div>
  </div>
  <script>
    function escapeHtml(t) {
      return String(t == null ? '' : t)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    var state = {
      tour: null,
      rooms: [],
      currentRoom: null,
      mediaIndex: 0,
      viewer: null,
      scene: null,
      hotspotHandles: [],
      mode: null,
    };

    window.initTour = function (tour) {
      try {
        state.tour = tour || {};
        state.rooms = (tour.rooms || []).slice().sort(function (a, b) { return (a.order || 0) - (b.order || 0); });
        if (!state.rooms.length) {
          document.getElementById('root').innerHTML = '<div class="tour-empty">Bu mülke ait oda bulunamadı.</div>';
          return;
        }
        var startId = tour.startRoomId;
        var startRoom = startId && state.rooms.find(function (r) { return r.id === startId; });
        showRoom(startRoom || state.rooms[0]);
      } catch (e) {
        document.getElementById('root').innerHTML =
          '<div class="tour-error">Tur yüklenemedi: ' + escapeHtml(e && e.message ? e.message : String(e)) + '</div>';
      }
    };

    function destroyViewer() {
      if (state.viewer) {
        try { state.viewer.destroy(); } catch (_) {}
        state.viewer = null;
        state.scene = null;
      }
      state.hotspotHandles.forEach(function (h) { try { h.destroy(); } catch (_) {} });
      state.hotspotHandles = [];
    }

    function chipsHtml(currentRoom) {
      var others = state.rooms.filter(function (r) { return r.id !== currentRoom.id; }).slice(0, 6);
      if (!others.length) return '';
      return others.map(function (r) {
        return '<button type="button" class="tour-flat__chip" data-target="' + r.id + '">→ ' + escapeHtml(r.name) + '</button>';
      }).join('');
    }

    function attachChipHandlers() {
      document.querySelectorAll('.tour-flat__chip').forEach(function (btn) {
        btn.onclick = function () {
          var room = state.rooms.find(function (r) { return r.id === btn.dataset.target; });
          if (room) showRoom(room);
        };
      });
    }

    function showRoom(room) {
      destroyViewer();
      state.currentRoom = room;
      state.mediaIndex = 0;
      var firstUrl = room && room.panoramaUrl;
      if (!firstUrl) {
        document.getElementById('root').innerHTML =
          '<div class="tour-empty">Bu odada fotoğraf yok</div>';
        return;
      }
      // Önce backend ipucu (mediaType) — kesin bilgi
      if (room.mediaType === 'PANORAMA') {
        renderPanorama(room);
        return;
      }
      if (room.mediaType === 'IMAGE') {
        renderFlat(room);
        return;
      }
      // İpucu yoksa görsel oranına bak (eski kayıtlar için)
      var img = new Image();
      img.crossOrigin = 'anonymous';
      img.onload = function () {
        var ratio = img.width / img.height;
        if (ratio >= 1.75 && ratio <= 2.25) {
          renderPanorama(room);
        } else {
          renderFlat(room);
        }
      };
      img.onerror = function () {
        renderFlat(room);
      };
      img.src = firstUrl;
    }

    function renderPanorama(room) {
      state.mode = 'panorama';
      var root = document.getElementById('root');
      root.innerHTML =
        '<header class="tour-header"><h1>' + escapeHtml((state.tour && state.tour.title) || '') + ' · ' + escapeHtml(room.name) + '</h1></header>' +
        '<div class="tour-stage" id="stage"></div>' +
        '<footer class="tour-footer"><div class="tour-rooms" id="chips"></div>' +
        '<p class="tour-hint">Yeşil noktalara dokunun · sürükleyerek bakın</p></footer>';
      var chips = document.getElementById('chips');
      state.rooms.forEach(function (r) {
        var btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'tour-room-chip' + (r.id === room.id ? ' tour-room-chip--active' : '');
        btn.textContent = r.name;
        btn.onclick = function () { showRoom(r); };
        chips.appendChild(btn);
      });

      var stage = document.getElementById('stage');
      stage.innerHTML = '<div class="tour-panorama" id="pano" style="position:absolute;inset:0;"></div>';
      stage.style.position = 'relative';
      stage.style.flex = '1';
      var el = document.getElementById('pano');
      var viewer = new Marzipano.Viewer(el, { controls: { mouseViewMode: 'drag' } });
      state.viewer = viewer;
      var source = Marzipano.ImageUrlSource.fromString(room.panoramaUrl);
      var geometry = new Marzipano.EquirectGeometry([{ width: 4096 }]);
      var limiter = Marzipano.RectilinearView.limit.traditional(4096, 120 * Math.PI / 180);
      var view = new Marzipano.RectilinearView({ yaw: 0, pitch: 0, fov: Math.PI / 2 }, limiter);
      var scene = viewer.createScene({ source: source, geometry: geometry, view: view });
      scene.switchTo();
      state.scene = scene;
      var container = scene.hotspotContainer();
      (room.hotspots || []).forEach(function (spot) {
        var btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'tour-hotspot';
        btn.innerHTML = '<span class="tour-hotspot__dot"></span><span class="tour-hotspot__label">' + escapeHtml(spot.label) + '</span>';
        btn.onclick = function (e) {
          e.stopPropagation();
          var target = state.rooms.find(function (r) { return r.id === spot.targetRoomId; });
          if (target) showRoom(target);
        };
        state.hotspotHandles.push(container.createHotspot(btn, { yaw: spot.yaw, pitch: spot.pitch }));
      });
    }

    function renderFlat(room) {
      state.mode = 'flat';
      var media = (room.media && room.media.length ? room.media : [{ url: room.panoramaUrl }]);
      state.currentRoom = room;
      state.mediaIndex = 0;
      drawFlat(room, media);
    }

    function drawFlat(room, media) {
      var idx = state.mediaIndex;
      var current = media[idx] || media[0];
      var url = (current && (current.url || current.panoramaUrl)) || room.panoramaUrl;
      var root = document.getElementById('root');
      var counter = media.length > 1 ? ('<div class="tour-flat__counter">' + (idx + 1) + ' / ' + media.length + '</div>') : '';
      var prev = media.length > 1 ? '<button type="button" class="tour-flat__nav tour-flat__nav--prev" id="prev">‹</button>' : '';
      var next = media.length > 1 ? '<button type="button" class="tour-flat__nav tour-flat__nav--next" id="next">›</button>' : '';
      var chips = chipsHtml(room);
      var chipsBlock = chips ? '<div class="tour-flat__transitions">' + chips + '</div>' : '';
      root.innerHTML =
        '<header class="tour-header"><h1>' + escapeHtml((state.tour && state.tour.title) || '') + ' · ' + escapeHtml(room.name) + '</h1></header>' +
        '<div class="tour-flat" id="stage">' +
        '<img class="tour-flat__img" src="' + escapeHtml(url) + '" alt="' + escapeHtml(room.name) + '" />' +
        prev + next + counter + chipsBlock +
        '</div>';
      if (media.length > 1) {
        document.getElementById('prev').onclick = function () {
          state.mediaIndex = (state.mediaIndex - 1 + media.length) % media.length;
          drawFlat(room, media);
        };
        document.getElementById('next').onclick = function () {
          state.mediaIndex = (state.mediaIndex + 1) % media.length;
          drawFlat(room, media);
        };
        var startX = null;
        var stage = document.getElementById('stage');
        stage.addEventListener('touchstart', function (e) {
          if (e.touches.length === 1) startX = e.touches[0].clientX;
        }, { passive: true });
        stage.addEventListener('touchend', function (e) {
          if (startX == null) return;
          var dx = (e.changedTouches[0] && e.changedTouches[0].clientX) - startX;
          if (Math.abs(dx) > 50) {
            if (dx < 0) state.mediaIndex = (state.mediaIndex + 1) % media.length;
            else state.mediaIndex = (state.mediaIndex - 1 + media.length) % media.length;
            drawFlat(room, media);
          }
          startX = null;
        });
      }
      attachChipHandlers();
    }

    if (window.__TOUR_DATA__) {
      window.initTour(window.__TOUR_DATA__);
    }
  </script>
</body>
</html>
